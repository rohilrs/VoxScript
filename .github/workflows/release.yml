name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.0.1-rc1). Used for dry-run testing only.'
        required: true

permissions:
  contents: write   # vpk upload github creates/edits releases

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Compute version
        id: version
        shell: pwsh
        # Pass GitHub-Actions-interpolated strings as env vars so untrusted
        # input (dispatch `version` especially) cannot inject into the script.
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          $ver = if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            $env:INPUT_VERSION
          } else {
            $env:REF_NAME -replace '^v', ''
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $ver"

      - name: Restore
        run: dotnet restore VoxScript.slnx

      - name: Test (release gate)
        # -r win-x64 triggers the RID-conditional WindowsAppSDKSelfContained
        # property on VoxScript.Tests.csproj so the test host doesn't hang
        # looking for a system-installed WinApp SDK runtime on the runner.
        # --blame-hang-timeout fails the run in 5 min instead of silently
        # hanging the whole workflow if a test deadlocks.
        run: >
          dotnet test VoxScript.Tests
          --configuration Release
          --no-restore
          -r win-x64
          --blame-hang-timeout 5min
          --logger "console;verbosity=normal"

      - name: Publish
        run: >
          dotnet publish VoxScript
          -r win-x64
          -c Release
          --self-contained
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o ./publish

      - name: Verify publish output has VoxScript.pri
        shell: pwsh
        run: |
          # Loud failure if the app's PRI is missing. Without it the installed
          # WinUI 3 app throws XamlParseException at MainWindow construction.
          $pri = Get-ChildItem ./publish/ -Filter 'VoxScript.pri' -Recurse -ErrorAction SilentlyContinue
          if (-not $pri) {
            Write-Error "VoxScript.pri not found in publish output. Listing all .pri files:"
            Get-ChildItem ./publish/ -Filter '*.pri' -Recurse | Format-Table FullName, Length
            exit 1
          }
          Write-Host "Found: $($pri.FullName) ($($pri.Length) bytes)"

      - name: Install vpk CLI
        run: dotnet tool install -g vpk

      - name: Pack with Velopack
        run: >
          vpk pack
          --packId VoxScript
          --packVersion ${{ steps.version.outputs.VERSION }}
          --packDir ./publish
          --mainExe VoxScript.exe
          --icon VoxScript/Assets/app.ico
          --packTitle "VoxScript"
          --packAuthors "Rohil Shah"

      - name: Upload to GitHub Releases
        # Token passed via env instead of --token argv so it never appears in
        # the command line (even masked, avoiding any risk of shell-trace leaks).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          vpk upload github
          --repoUrl https://github.com/rohilrs/VoxScript
          --publish
          --releaseName "VoxScript v${{ steps.version.outputs.VERSION }}"
          --tag v${{ steps.version.outputs.VERSION }}
          --token $env:GH_TOKEN
